<header class="header shadow-sm">
  <div class="header-container container">
    <div class="logo-area" routerLink="/" style="cursor: pointer;">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="feather feather-file-text">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
          <polyline points="10 9 9 9 8 9"></polyline>
        </svg>
      </div>
      <h1 class="brand-name" routerLink="/" style="cursor: pointer;">eInvoice<span>Builder</span></h1>
    </div>
    <button class="mobile-toggle" (click)="toggleMenu()" aria-label="Toggle navigation">
      <svg *ngIf="!isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
      <svg *ngIf="isMobileMenuOpen" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    <nav class="nav-links" [class.open]="isMobileMenuOpen">
      @if (isLoggedIn) {
      @if (isAdmin) {
      <a routerLink="/admin/dashboard" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Dashboard</a>
      <a routerLink="/admin/subscriptions" routerLinkActive="active" (click)="closeMenu()"
        class="nav-link">Subscriptions</a>
      }
      <a routerLink="/builder" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Builder</a>
      @if (isAdmin) {
      <a routerLink="/admin/templates" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Templates</a>
      }
      <a routerLink="/invoices" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Invoices</a>
      <a (click)="logout(); closeMenu()" class="nav-link" style="cursor: pointer;">Logout</a>
      } @else {
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()"
        class="nav-link">Home</a>
      <a routerLink="/pricing" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Pricing</a>
      <a routerLink="/login" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Login</a>
      <a routerLink="/signup" routerLinkActive="active" (click)="closeMenu()" class="nav-link">Sign Up</a>
      }
    </nav>
    @if (isLoggedIn && currentUser) {
    <div class="user-profile">
      <div class="user-info">
        <span class="user-name">{{ currentUser.fullName }}</span>
        <span class="user-role">{{ isAdmin ? 'Administrator' : 'User' }}</span>
      </div>
      <div class="avatar">{{ initials }}</div>
    </div>
    }
  </div>
</header>
