<div class="view-page">
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <div class="header-left">
                <button class="back-btn" (click)="goBack()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back to Admin Template
                </button>
                <div class="title-block">
                    <h1>Raw Business Template</h1>
                    <p *ngIf="business">Viewing uploaded template image for <strong>{{ business.businessName }}</strong> (ID: {{ business.businessId }})</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" (click)="cancel()">
                    Cancel
                </button>
                <button class="btn btn-primary" (click)="downloadImage()" [disabled]="!imageUrl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download Image
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="view-content card">
            <div *ngIf="isLoading" class="loading-state">
                <div class="spinner"></div>
                <p>Retrieving template image...</p>
            </div>

            <div *ngIf="errorMessage" class="error-state">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                <h3>Could Not Load Image</h3>
                <p>{{ errorMessage }}</p>
                <button class="btn btn-primary" (click)="goBack()">Go Back</button>
            </div>

            <div *ngIf="!isLoading && !errorMessage && imageUrl" class="image-wrapper">
                <img [src]="imageUrl" alt="Business Raw Template" class="template-img">
            </div>
        </div>
    </div>
</div>
